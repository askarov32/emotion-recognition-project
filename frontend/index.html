<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Recognition</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <div class="container">
      <header class="hero">
        <h1>Audio Emotion Recognition</h1>
        <p class="subtitle">
          Upload an audio file and detect the speaker's emotion
        </p>
      </header>

      <section class="card upload-card">
        <h2 class="section-title">Upload Audio</h2>

        <label for="audioFile" class="file-label">Choose audio file</label>
        <input type="file" id="audioFile" accept=".wav,audio/wav,audio/mpeg,.mp3,.m4a,audio/x-m4a" />

        <div class="actions">
          <button id="predictBtn">Predict Emotion</button>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section id="result" class="card result-card hidden">
        <div class="result-header">
          <div>
            <p class="result-label">Prediction Result</p>
            <h2 id="emotionTitle" class="emotion-title">Sad</h2>
          </div>

          <div class="confidence-box">
            <span class="confidence-caption">Confidence</span>
            <span id="confidence" class="confidence-value">71.85%</span>
          </div>
        </div>

        <div class="top-summary">
          <div class="summary-item">
            <span class="summary-key">Detected emotion</span>
            <span id="emotion" class="summary-value emotion-badge">sad</span>
          </div>
        </div>

        <div class="probabilities-section">
          <h3>Probabilities</h3>
          <div id="probabilitiesList" class="probabilities-list"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
